    if(!nums.length){setImportMsg("⚠️ Nenhum número válido encontrado.");return;}
    var chron=nums.slice().reverse();
    var hh=[],ll={},acts=[];
    chron.forEach(function(n){var r=computeAdd(hh,ll,n);hh=r.history;ll=r.learned;acts.unshift(r.action);});
    setHistory(hh);setLearned(ll);setActionLog(acts.slice(0,50));
    setImportText("");setImportMsg("✅ "+chron.length+" números importados!");
  }
  var run=getCurrentRun(history);
  var decision=getDecision(history,learned);
  var last15=history.slice(0,15).slice().reverse();
  var learnedList=Object.entries(learned).map(function(a){return Object.assign({key:a[0]},a[1]);}).sort(function(a,b){return b.total-a.total;});
  function Chip(n,opts){
    opts=opts||{};
    var info=classify(n);
    var ring=info.ring?"0 0 0 2px #d4af37":"none";
    return h("div",{key:"c"+n+(opts.k||""),className:"chip-col"},
      h("div",{className:"chip",style:{background:numBg(n),boxShadow:ring}},n),
      h("span",{className:"chip-lbl"},TS[info.token])
    );
  }
  var decCard=null;
  if(decision){
    if(decision.mode==="hold"){
      decCard=h("div",{className:"dec",style:{borderColor:"#ef4444",background:"rgba(0,0,0,.7)"}},
        h("div",{className:"dec-inner",style:{background:"rgba(239,68,68,.1)"}},
          h("p",{className:"dec-title",style:{color:"#ef4444"}},"🛑 SEGURAR — NÃO APOSTE"),
          h("p",{className:"dec-desc",style:{color:"#fca5a5"}},decision.reason)
        )
      );
    } else {
      var isConf=decision.mode==="confluence";
      var bc=isConf?"#4ade80":"#d4af37";
      decCard=h("div",{className:"dec",style:{borderColor:bc,background:"rgba(0,0,0,.7)"}},
        h("div",{className:"dec-inner",style:{background:isConf?"rgba(74,222,128,.1)":"rgba(212,175,55,.08)"}},
          h("div",{className:"rowsb",style:{marginBottom:0}},
            h("p",{className:"dec-title",style:{color:bc}},isConf?"✅ CONFLUÊNCIA — DNA + Padrão":"📡 DNA MASTER — Foco detectado"),
            isConf&&decision.confidence>0?h("span",{className:"badge",style:{background:"#4ade80",color:"#000"}},decision.confidence+"% confiança"):null
          ),
          h("p",{className:"dec-desc"},isConf?"DNA Master e padrão de sequência convergem!":"DNA com foco. Módulo 1 acumulando dados.")
        ),
        h("p",{style:{fontWeight:"900",fontSize:"12px",marginBottom:"8px",color:"#d4af37"}},"🎯 SUGESTÃO — "+decision.numbers.length+" fichas (máx 15):"),
        h("div",{className:"chips"},decision.numbers.map(function(n,i){return Chip(n,{k:"d"+i});})),
        decision.mod1Token?h("p",{className:"mod1-bar"},"📊 Módulo 1: "+TI[decision.mod1Token]+" "+TL[decision.mod1Token]+(decision.mod1Pct?" ("+decision.mod1Pct+"% — "+decision.mod1Total+" ocorr.)":"")):
          h("p",{className:"mod1-bar"},"📊 Módulo 1: acumulando dados...")
      );
    }
  }
  var predBox=null;
  if(run){
    var k2=run.token+"|"+capLen(run.length);
    var ent2=learned[k2];
    if(ent2&&ent2.total>0){
      var s2=Object.entries(ent2.next).sort(function(a,b){return b[1]-a[1];});
      predBox=h("div",{className:"pred-box"},
        h("div",{className:"pred-hdr"},"🧠 ANTECIPAÇÃO ("+ent2.total+" ocorrência"+(ent2.total>1?"s":"")+")"),
        s2.slice(0,3).map(function(arr){
          var pct=Math.round(arr[1]/ent2.total*100);
          var cls=pct>=60?"ph":pct>=40?"pm":"pl";
          return h("div",{className:"pred-row",key:arr[0]},
            h("span",null,TI[arr[0]]+" "+TL[arr[0]]),
            h("span",{className:cls},pct+"%")
          );
        }),
        h("p",{className:"tiny muted",style:{marginTop:"6px"}},"Quando \""+TL[run.token]+" x"+capLen(run.length)+(capLen(run.length)===4?"+":"")+"\" apareceu antes, foi assim que quebrou.")
      );
    } else {
      predBox=h("div",{className:"info-box"},"ℹ️ Ainda sem dados suficientes para este padrão. Continue adicionando números.");
    }
  }
  var runCard=h("div",{className:"card"},
    h("div",{className:"ctitle"},"🎯 SEQUÊNCIA ATUAL"),
    !run?h("p",{className:"muted"},"Toque em um número abaixo para começar."):
    h("div",null,
      h("div",{className:"row",style:{marginBottom:"4px"}},
        h("div",{className:"run-circle",style:{background:TB[run.token],boxShadow:run.token==="IR"||run.token==="IB"?"0 0 0 3px #d4af37":"none"}},TI[run.token]),
        h("div",null,h("p",{className:"run-label"},TL[run.token]),h("p",{className:"tiny muted"},"repetiu "+run.length+"x seguidas"))
      ),
      predBox
    )
  );
  var dnaCard=null;
  if(history.length>0){
    var last=history[0].num;
    var suggestions=getDNA(last);
    var totalR=suggestions.reduce(function(a,s){return a+s.relevance;},0);
    dnaCard=h("div",{className:"card"},
      h("div",{className:"ctitle"},"🧬 DNA MASTER — PÓS "+last),
      suggestions.slice(0,5).map(function(s,i){
        var pct=totalR>0?Math.round(s.relevance/totalR*100):0;
        var cls=s.relevance>=7?"ph":s.relevance>=4?"pm":"pl";
        return h("div",{className:"dna-row",key:i},
          h("div",{className:"dna-rhead"},
            h("span",{style:{fontWeight:"900"}},"Alvo: "+s.target+(s.spread>0?" ±"+s.spread+" viz.":" (exato)")),
            h("span",{className:cls},pct+"%")
          ),
          h("div",{className:"num-tags"},s.nums.map(function(n){
            return h("span",{key:n,className:"ntag",style:{background:numBg(n)}},n);
          }))
        );
      }),
      h("p",{className:"tiny muted",style:{marginTop:"6px"}},"🟢 Verde=zero | 🔴 Vermelho | ⬛ Preto")
    );
  }
  var l15card=last15.length>0?h("div",{className:"card"},
    h("div",{className:"ctitle"},"📈 ÚLTIMOS "+last15.length+" (mais antigo → mais recente)"),
    h("div",{className:"l15chips"},
      last15.map(function(x,i){return Chip(x.num,{k:"l"+i});}).concat(
        h("div",{key:"next",className:"chip-col"},h("div",{className:"chip chip-next"},"?"),h("span",{className:"chip-lbl"},"próx"))
      )
    )
  ):null;
  var numBtns=[];
  for(var n=1;n<=36;n++){
    var info2=classify(n);
    numBtns.push(h("button",{key:"n"+n,className:"nbtn",
      style:{background:info2.color==="red"?"#dc2626":"#27272a",boxShadow:info2.ring?"inset 0 0 0 2px #d4af37":"none"},
      onClick:(function(nn){return function(){addNumber(nn);};})(n)},n));
  }
  var inputCard=h("div",{className:"card"},
    h("div",{className:"rowsb"},
      h("div",{className:"ctitle",style:{marginBottom:0}},"🎲 REGISTRAR NÚMERO"),
      h("div",{className:"ctrls"},
        h("button",{className:"btn btn-undo",onClick:undo,disabled:!history.length},"↩ Desfazer"),
        h("button",{className:"btn btn-reset",onClick:resetAll},"🗑 Nova Mesa")
      )
    ),
    h("button",{className:"zero-btn",onClick:function(){addNumber(0);}},"0"),
    h("div",{className:"g36"},numBtns),
    h("p",{className:"tiny muted",style:{marginTop:"7px"}},"◻ Borda dourada = irmão de cor")
  );
  var learnedCard=h("div",{className:"card"},
    h("div",{className:"ctitle"},"📊 PADRÕES APRENDIDOS"),
    !learnedList.length?h("p",{className:"muted"},"Nenhum padrão ainda. O app aprende a cada quebra de sequência."):
    learnedList.slice(0,6).map(function(p){
      var parts=p.key.split("|");var tok=parts[0];var len=parts[1];
      var ss=Object.entries(p.next).sort(function(a,b){return b[1]-a[1];});
      return h("div",{className:"litem",key:p.key},
        h("div",{className:"lhead"},
          h("span",{style:{fontWeight:"900"}},TI[tok]+" "+TL[tok]+" ×"+len+(len==="4"?"+":"")),
          h("span",{className:"tiny muted"},p.total+"x")
        ),
        h("div",{className:"ltags"},ss.map(function(a){
          return h("span",{className:"tag",key:a[0]},TI[a[0]]+" "+TL[a[0]]+" ",h("b",{className:"tpct"},Math.round(a[1]/p.total*100)+"%"));
        }))
      );
    })
  );
  var mapCells=[];
  TABLE_ROWS.forEach(function(row){row.forEach(function(n){
    var inf=classify(n);
    mapCells.push(h("div",{key:"m"+n,className:"mcell",style:{background:inf.color==="red"?"#dc2626":"#27272a",boxShadow:inf.ring?"inset 0 0 0 2px #d4af37":"none"}},n));
  });});
  var mapCard=h("div",{className:"card"},
    h("div",{className:"toggle-row",onClick:function(){setShowTable(!showTable);}},
      h("div",{className:"ctitle",style:{marginBottom:0}},"🗺️ MAPA IRMÃOS DE COR"),
      h("span",{className:"tiny muted"},showTable?"ocultar":"mostrar")
    ),
    showTable?h("div",{className:"map-grid"},mapCells):null
  );
  var importCard=h("div",{className:"card"},
    h("div",{className:"ctitle"},"📥 IMPORTAR HISTÓRICO"),
    h("div",{className:"hint"},"1. Anexe o print aqui no chat e peça ao Claude os números (esq→dir).\n2. Cole a lista abaixo e toque em Importar."),
    h("textarea",{className:"itarea",placeholder:"Ex: 13 18 22 12 5 33 34 4 0 29...",value:importText,onChange:function(e){setImportText(e.target.value);}}),
    h("button",{className:"ibtn",onClick:importSeq},"⬇️ Importar e Iniciar Análise"),
    importMsg?h("p",{className:"imsg"},importMsg):null
  );
  return h("div",{className:"app"},
    h("div",{className:"wrap"},
      h("div",{className:"hdr"},h("h1",null,"🎰 ROULETTE ANALYZER"),h("p",null,"R.V33.59 — MÓDULO 1 + DNA MASTER")),
      importCard,
      decCard,
      runCard,
      dnaCard,
      l15card,
      inputCard,
      learnedCard,
      mapCard,
      h("div",{className:"footer-card"},h("p",{className:"tiny muted",style:{textAlign:"center"}},"🔧 Módulos futuros serão adicionados aqui."))
    )
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>

  getDNA(last).forEach(function(s){ s.nums.forEach(function(n){dnaMap[n]=(dnaMap[n]||0)+s.relevance;}); });
  var dnaKeys=Object.keys(dnaMap);
  var maxRel=dnaKeys.length?Math.max.apply(null,dnaKeys.map(function(k){return dnaMap[k];})):0;
  if(dnaKeys.length>10&&maxRel<=2) return {mode:"hold",reason:"DNA com muitos alvos e baixa definição. Aguarde."};
  var run=getCurrentRun(hist);
  var mod1Token=null,mod1Conf=0,mod1Total=0,mod1Pct=0;
  if(run){
    var key=run.token+"|"+capLen(run.length);
    var ent=learned[key];
    if(ent&&ent.total>0){
      var sorted=Object.entries(ent.next).sort(function(a,b){return b[1]-a[1];});
      if(sorted.length){mod1Token=sorted[0][0];mod1Conf=sorted[0][1];mod1Total=ent.total;mod1Pct=Math.round(mod1Conf/mod1Total*100);}
    }
  }
  var confluent=[],dnaOnly=[];
  Object.entries(dnaMap).forEach(function(arr){
    var n=parseInt(arr[0]),rel=arr[1],tok=classify(n).token;
    if(mod1Token&&tok===mod1Token) confluent.push({n:n,rel:rel}); else dnaOnly.push({n:n,rel:rel});
  });
  confluent.sort(function(a,b){return b.rel-a.rel;});
  var finalNums,mode,confidence=0;
  if(confluent.length>0&&mod1Pct>=50){
    mode="confluence";confidence=mod1Pct;
    finalNums=confluent.slice(0,15).map(function(x){return x.n;});
  } else if(confluent.length>0&&mod1Pct>0&&mod1Pct<50){
    return {mode:"hold",reason:"Confluência com confiança de "+mod1Pct+"% (abaixo de 50%). Aguarde."};
  } else {
    var focused=Object.entries(dnaMap).map(function(a){return {n:parseInt(a[0]),rel:a[1]};}).filter(function(x){return x.rel>=3;}).sort(function(a,b){return b.rel-a.rel;});
    if(!focused.length) return {mode:"hold",reason:"Sem confluência e DNA sem foco. Aguarde."};
    mode="dna";confidence=0;
    finalNums=focused.slice(0,15).map(function(x){return x.n;});
  }
  finalNums=finalNums.filter(function(n,i,a){return a.indexOf(n)===i;}).slice(0,15);
  return {mode:mode,confidence:confidence,mod1Token:mod1Token,mod1Total:mod1Total,mod1Pct:mod1Pct,numbers:finalNums,lastNum:last};
}
function computeAdd(hist,lrn,n){
  var info=classify(n);
  var action={patternKey:null,nextToken:null};
  var newLrn=lrn;
  if(hist.length>0&&hist[0].token!==info.token){
    var run=getCurrentRun(hist);
    var key=run.token+"|"+capLen(run.length);
    action={patternKey:key,nextToken:info.token};
    var ent=lrn[key]||{total:0,next:{}};
    var nc=Object.assign({},ent.next);
    nc[info.token]=(nc[info.token]||0)+1;
    newLrn=Object.assign({},lrn);
    newLrn[key]={total:ent.total+1,next:nc};
  }
  var obj={num:n,token:info.token,color:info.color,ring:info.ring};
  return {history:[obj].concat(hist).slice(0,50),learned:newLrn,action:action};
}
